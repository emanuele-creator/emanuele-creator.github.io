<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Taboo Player - TV Game Night</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#08081A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TV Game Night">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root{--bg:#05050f;--surface:#111124;--surface2:#1d1d36;--gold:#F5C518;--txt:#F7F4EB;--mut:#9ea1b3;--danger:#E74C3C;--success:#2ECC71}
    *{box-sizing:border-box;margin:0;padding:0}
    html{width:100%;overflow-x:hidden}
    body{min-height:100vh;background:linear-gradient(180deg,#05050f 0%,#090918 55%,#10102d 100%);color:var(--txt);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;padding:1rem;overflow-x:hidden}
    button,input{max-width:100%}
    .screen{width:min(100%,720px);text-align:center}
    .status{position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:.6rem 1rem;font-size:.88rem;font-weight:700;letter-spacing:.08em;display:inline-flex;align-items:center;gap:.5rem;z-index:10;max-width:calc(100vw - 2rem);white-space:nowrap}
    .status-dot{width:10px;height:10px;border-radius:50%;background:var(--danger)}
    .status-dot.connected{background:var(--success)}
    .screen-inner{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:32px;padding:2.2rem 1.4rem;box-shadow:0 40px 120px rgba(0,0,0,.45)}
    .title{font-size:1rem;font-weight:900;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:1.1rem}
    .word-box{font-size:3.8rem;font-weight:900;line-height:1;letter-spacing:.1em;margin-bottom:1.1rem;color:#fff;overflow-wrap:anywhere}
    .subtitle{font-size:.95rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);margin-bottom:.9rem}
    .taboo-list{display:grid;gap:.85rem;text-align:left}
    .taboo-item{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.22);border-radius:18px;padding:1rem 1.1rem;font-size:1.05rem;font-weight:800;color:#fff;overflow-wrap:anywhere}
    .round-bar{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1.2rem}
    .round-stat{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:.9rem}
    .round-label{font-size:.72rem;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin-bottom:.25rem}
    .round-value{font-size:1.8rem;font-weight:900;color:var(--gold)}
    .action-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-top:1.2rem}
    .btn-success{background:var(--success);color:#06120b}
    .btn-neutral{background:rgba(255,255,255,.12);color:#fff}
    .btn-danger{background:var(--danger);color:#fff}
    .btn:disabled{opacity:.42;cursor:not-allowed;transform:none;filter:none}
    .waiting{padding:2.5rem 1rem}
    .waiting h2{font-size:2.4rem;line-height:1.05;margin-bottom:.75rem}
    .waiting p{font-size:1.05rem;color:var(--mut);line-height:1.7}
    .setup-row{display:grid;gap:.65rem;margin:1.2rem 0}
    .setup-row label{font-size:.82rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
    .setup-inline{display:flex;align-items:center;gap:.6rem;max-width:320px;margin-top:.45rem}
    .setup-inline input{width:100%;border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:.95rem 1rem;background:rgba(255,255,255,.04);color:#fff;font-size:1rem}
    .players-list{display:grid;gap:.65rem;margin-top:.6rem}
    .player-choice{display:flex;align-items:center;gap:.75rem;padding:1rem 1rem;border:1px solid rgba(255,255,255,.12);border-radius:16px;background:rgba(255,255,255,.04)}
    .player-choice input{width:18px;height:18px}
    .player-choice span{font-size:1rem;font-weight:700;color:#fff}
    .setup-note{margin-top:1rem;color:var(--mut);font-size:.95rem;line-height:1.45}
    .btn{border:none;border-radius:18px;padding:1rem 1.2rem;font-size:1rem;font-weight:800;cursor:pointer;transition:transform .18s,filter .18s;background:var(--gold);color:#08081A;white-space:normal;line-height:1.2}
    .btn-setup{margin-top:1rem;min-width:220px}
    .note{margin-top:1.3rem;color:var(--mut);font-size:.92rem;line-height:1.6}
    @media(hover:hover) and (pointer:fine){
      .btn:hover{transform:translateY(-1px);filter:brightness(1.05)}
    }
    @media(max-width:520px){
      body{display:block;padding:4.6rem .75rem 1rem}
      .screen{width:100%}
      .status{top:.65rem;font-size:.76rem;letter-spacing:.04em;padding:.5rem .75rem}
      .screen-inner{padding:1.15rem .85rem;border-radius:18px}
      .waiting{padding:1.25rem .2rem}
      .waiting h2{font-size:1.85rem}
      .waiting p{font-size:.95rem}
      .btn-setup{min-width:0;width:100%}
      .round-bar{grid-template-columns:1fr 1fr;gap:.55rem}
      .round-stat{padding:.7rem .55rem;border-radius:12px}
      .round-label{font-size:.62rem;letter-spacing:.08em}
      .round-value{font-size:1.45rem}
      .title{font-size:.82rem;letter-spacing:.22em}
      .word-box{font-size:2.35rem;letter-spacing:.04em}
      .subtitle{font-size:.78rem;letter-spacing:.12em}
      .taboo-list{gap:.55rem}
      .taboo-item{font-size:.94rem;padding:.78rem .85rem;border-radius:12px}
      .action-grid{grid-template-columns:1fr;gap:.6rem}
      .btn{width:100%;padding:.9rem 1rem;border-radius:14px}
      .note{font-size:.84rem}
    }
    @media(max-width:360px){
      .round-bar{grid-template-columns:1fr}
      .word-box{font-size:2rem}
    }
  </style>
</head>
<body>
  <div class="status" id="connection-status"><span class="status-dot" id="status-dot"></span><span id="status-text">disconnesso</span></div>
  <main class="screen">
    <div class="screen-inner" id="waiting-screen">
      <div class="waiting">
        <h2>PRONTO PER TABOO</h2>
        <p id="waiting-copy">Seleziona Taboo dal menu principale, scegli il giocatore e poi avvia il turno da qui.</p>
        <button class="btn btn-primary btn-setup" id="btn-start-round">Avvia turno</button>
        <p class="setup-note" id="setup-summary">In attesa del giocatore</p>
      </div>
    </div>

    <div class="screen-inner" id="taboo-screen" style="display:none;">
      <div class="round-bar">
        <div class="round-stat">
          <div class="round-label">Tempo</div>
          <div class="round-value" id="timer-text">--</div>
        </div>
        <div class="round-stat">
          <div class="round-label">Punti</div>
          <div class="round-value" id="score-text">0</div>
        </div>
      </div>
      <div class="title">PAROLA</div>
      <div class="word-box" id="word-text">CARICAMENTO...</div>
      <div class="subtitle">NON DIRE:</div>
      <div class="taboo-list" id="taboo-list"></div>
      <div class="action-grid">
        <button class="btn btn-success" id="btn-correct">Indovinata</button>
        <button class="btn btn-neutral" id="btn-pass">Passa</button>
        <button class="btn btn-danger" id="btn-taboo">Taboo</button>
      </div>
      <p class="note" id="player-note">Giocatore: -</p>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script>
    // Sostituisci questi valori con le tue credenziali Firebase.
    const firebaseConfig = {
        apiKey: "AIzaSyAs9kwrZnnBTOaBzkLn6ZhLN5mfWWmXcl4",
        authDomain: "tv-game-night.firebaseapp.com",
        databaseURL: "https://tv-game-night-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tv-game-night",
        storageBucket: "tv-game-night.firebasestorage.app",
        messagingSenderId: "570468387403",
        appId: "1:570468387403:web:1bcd29c85f8e8d00539bce"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const gameStateRef = database.ref('currentGameState');
    const scoreEventsRef = database.ref('tabooScoreEvents');
    const connectedRef = database.ref('.info/connected');

    const waitingScreen = document.getElementById('waiting-screen');
    const tabooScreen = document.getElementById('taboo-screen');
    const wordText = document.getElementById('word-text');
    const tabooList = document.getElementById('taboo-list');
    const playerNote = document.getElementById('player-note');
    const waitingCopy = document.getElementById('waiting-copy');
    const setupSummary = document.getElementById('setup-summary');
    const btnStartRound = document.getElementById('btn-start-round');
    const btnCorrect = document.getElementById('btn-correct');
    const btnPass = document.getElementById('btn-pass');
    const btnTaboo = document.getElementById('btn-taboo');
    const timerText = document.getElementById('timer-text');
    const scoreText = document.getElementById('score-text');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    const TABOO_WORDS = [
      {word:'AEROPORTO', taboo:['AEREO','VOLARE','VALIGIA','PISTA','VIAGGIO']},
      {word:'GELATO', taboo:['CONO','FREDDO','ESTATE','GUSTO','COPPA']},
      {word:'BICICLETTA', taboo:['PEDALI','RUOTE','CASCO','CORSA','SELLA']},
      {word:'SCUOLA', taboo:['PROFESSORE','CLASSE','COMPITI','STUDENTE','LEZIONE']},
      {word:'TELEFONO', taboo:['CHIAMATA','SMARTPHONE','MESSAGGIO','SCHERMO','APP']},
      {word:'LIBRO', taboo:['PAGINE','LEGGERE','ROMANZO','AUTORE','BIBLIOTECA']},
      {word:'TRENO', taboo:['BINARI','STAZIONE','VIAGGIO','VAGONE','FERROVIA']},
      {word:'COMPUTER', taboo:['TASTIERA','MOUSE','SCHERMO','INTERNET','PC']},
      {word:'BOSCO', taboo:['ALBERI','FORESTA','NATURA','FOGLIE','ANIMALI']},
      {word:'MONTAGNA', taboo:['NEVE','SCIARE','VETTA','SALITA','ROCCIA']},
      {word:'PISCINA', taboo:['ACQUA','NUOTARE','TUFFO','COSTUME','CLORO']},
      {word:'FOTOGRAFIA', taboo:['MACCHINA','SCATTO','IMMAGINE','OBIETTIVO','SELFIE']},
      {word:'PANINO', taboo:['PANE','PROSCIUTTO','SALAME','MANGIARE','BAR']},
      {word:'MEDICO', taboo:['OSPEDALE','DOTTORE','VISITA','MALATTIA','PAZIENTE']},
      {word:'CANDELA', taboo:['FUOCO','LUCE','CERA','FIAMMA','COMPLEANNO']},
      {word:'SUPERMERCATO', taboo:['SPESA','CARRELLO','CASSA','SCATOLE','PRODOTTI']},
      {word:'METEO', taboo:['PIOGGIA','SOLE','TEMPERATURA','NUVOLE','PREVISIONI']},
      {word:'VACANZA', taboo:['HOTEL','MARE','VIAGGIO','ESTATE','RELAX']},
      {word:'OROLOGIO', taboo:['TEMPO','LANCETTE','ORE','POLSO','MINUTI']},
      {word:'CAMPEGGIO', taboo:['TENDA','NATURA','FUOCO','BOSCO','SACCOAPIELO']},
      {word:'CHITARRA', taboo:['CORDE','MUSICA','SUONARE','ROCK','PLETTRO']},
      {word:'ASCENSORE', taboo:['PIANI','SALIRE','SCENDERE','PALAZZO','BOTTONI']},
      {word:'MATRIMONIO', taboo:['SPOSI','ANELLO','CHIESA','NOZZE','ABITO']},
      {word:'BANANA', taboo:['FRUTTA','GIALLA','SCIMMIA','BUCCIA','TROPICALE']},
      {word:'LUNA', taboo:['NOTTE','SPAZIO','SATELLITE','STELLE','PIENA']},
      {word:'BOTTIGLIA', taboo:['ACQUA','BERE','TAPPO','VETRO','PLASTICA']},
      {word:'PARCHEGGIO', taboo:['AUTO','MACCHINA','POSTO','SOSTA','GARAGE']},
      {word:'AUTOBUS', taboo:['FERMATA','BIGLIETTO','MEZZO','AUTISTA','CITTÀ']},
      {word:'CIOCCOLATO', taboo:['DOLCE','CACAO','TAVOLETTA','FONDENTE','NUTELLA']},
      {word:'SPECCHIO', taboo:['RIFLESSO','BAGNO','GUARDARSI','VETRO','IMMAGINE']},
      {word:'RADIO', taboo:['MUSICA','STAZIONE','ASCOLTARE','VOCE','FM']},
      {word:'MUSEO', taboo:['ARTE','QUADRI','SCULTURE','VISITA','STORIA']},
      {word:'FESTA', taboo:['MUSICA','BALLARE','INVITATI','COMPLEANNO','DIVERTIMENTO']},
      {word:'TORTA', taboo:['DOLCE','CANDELINE','FETTA','COMPLEANNO','CREMA']},
      {word:'VOLCANO', taboo:['LAVA','ERUZIONE','FUOCO','MONTAGNA','CRATERE']},
      {word:'PENNARELLO', taboo:['COLORARE','DISEGNARE','INCHIOSTRO','SCUOLA','FOGLIO']},
      {word:'OCCHIALI', taboo:['VISTA','LENTI','VEDERE','SOLE','MONTATURA']},
      {word:'LAVATRICE', taboo:['VESTITI','DETERSIVO','BUCATO','CENTRIFUGA','CASA']},
      {word:'VIDEOGIOCO', taboo:['CONSOLE','GIOCARE','CONTROLLER','LIVELLO','ONLINE']},
      {word:'FARMACIA', taboo:['MEDICINE','DOTTORE','PILLOLE','SALUTE','RICETTA']},
      {word:'POMPIERE', taboo:['FUOCO','INCENDIO','CASERMA','ACQUA','SIRENA']},
      {word:'ZAINO', taboo:['SCUOLA','SPALLE','LIBRI','TASCA','VIAGGIO']},
      {word:'YOUTUBE', taboo:['VIDEO','ISCRITTI','CANALI','STREAMING','CREATOR']},
      {word:'TENNIS', taboo:['RACCHETTA','PALLINA','CAMPO','SERVIZIO','MATCH']},
      {word:'LAMPADINA', taboo:['LUCE','ELETTRICITÀ','ACCENDERE','LAMPADA','FILAMENTO']},
      {word:'GIORNALE', taboo:['NOTIZIE','ARTICOLO','CARTA','EDICOLA','CRONACA']},
      {word:'FRIGORIFERO', taboo:['FREDDO','CUCINA','CIBO','CONSERVARE','FREEZER']},
      {word:'CASTELLO', taboo:['RE','MEDIOEVO','TORRE','PRINCIPESSA','MURA']},
      {word:'CARAMELLA', taboo:['DOLCE','ZUCCHERO','INCARTO','MANGIARE','GUSTO']},
      {word:'SEMAFORO', taboo:['ROSSO','VERDE','STRADA','AUTO','INCROCIO']},
      {word:'OMBRELLO', taboo:['PIOGGIA','APRIRE','ACQUA','TEMPORALE','MANICO']}
    ];

    const defaultState = {
      mode: null,
      status: null,
      wordIndex: -1,
      word: '',
      taboo: [],
      currentPlayer: '',
      currentPlayerId: null,
      currentPlayerUid: null,
      timerSeconds: 60,
      startedAt: 0,
      endsAt: 0,
      score: 0,
      updatedAt: 0
    };

    let currentState = {...defaultState};
    let timerInterval = null;

    function setConnection(connected){
      statusDot.className = `status-dot ${connected ? 'connected' : ''}`;
      statusText.textContent = connected ? 'connesso' : 'disconnesso';
    }

    function showWaiting(){
      waitingScreen.style.display = 'block';
      tabooScreen.style.display = 'none';
    }

    function getRemainingSeconds(){
      if(currentState.status !== 'playing' || !currentState.endsAt)return currentState.timerSeconds || 0;
      return Math.max(0, Math.ceil((currentState.endsAt - Date.now()) / 1000));
    }

    function setActionButtonsDisabled(disabled){
      [btnCorrect, btnPass, btnTaboo].forEach(btn => btn.disabled = disabled);
    }

    function renderTimer(){
      const remaining = getRemainingSeconds();
      timerText.textContent = `${remaining}s`;
      if(currentState.mode === 'taboo' && currentState.status === 'playing' && remaining <= 0){
        endRound();
      }
    }

    function showTaboo(state){
      waitingScreen.style.display = 'none';
      tabooScreen.style.display = 'block';
      wordText.textContent = state.word || '---';
      playerNote.textContent = `Giocatore: ${state.currentPlayer || '-'}`;
      tabooList.innerHTML = (state.taboo || []).map(word => `<div class="taboo-item">${word}</div>`).join('');
      scoreText.textContent = state.score || 0;
      renderTimer();
      setActionButtonsDisabled(state.status !== 'playing');
    }

    function renderState(state){
      currentState = {...defaultState, ...state};
      if (currentState.mode === 'taboo' && currentState.status === 'playing') {
        showTaboo(currentState);
      } else {
        showWaiting();
        const hasPlayer = currentState.mode === 'taboo' && currentState.currentPlayer;
        btnStartRound.disabled = !hasPlayer || currentState.status === 'ended';
        if(currentState.status === 'ended'){
          waitingCopy.textContent = 'Tempo finito. Torna al menu principale per scegliere un nuovo turno.';
          setupSummary.textContent = `${currentState.currentPlayer || 'Giocatore'} · Punti turno: ${currentState.score || 0}`;
        } else if(hasPlayer){
          waitingCopy.textContent = 'Turno pronto. Premi Avvia e poi usa i tasti rapidi dopo ogni parola.';
          setupSummary.textContent = `${currentState.currentPlayer} · Timer: ${currentState.timerSeconds || 60}s`;
        } else {
          waitingCopy.textContent = 'Seleziona Taboo dal menu principale, scegli il giocatore e poi avvia il turno da qui.';
          setupSummary.textContent = 'In attesa del giocatore';
        }
      }
    }

    function getNextWordState(base=currentState){
      const nextIndex = (Math.max(-1, base.wordIndex) + 1) % TABOO_WORDS.length;
      const nextWord = TABOO_WORDS[nextIndex];
      return {
        wordIndex: nextIndex,
        word: nextWord.word,
        taboo: nextWord.taboo,
        updatedAt: Date.now()
      };
    }

    function startRound(){
      if(currentState.mode !== 'taboo' || !currentState.currentPlayerId)return;
      const now = Date.now();
      const seconds = Number(currentState.timerSeconds) || 60;
      gameStateRef.update({
        status: 'playing',
        score: 0,
        startedAt: now,
        endsAt: now + seconds * 1000,
        ...getNextWordState({...currentState, wordIndex: -1})
      });
    }

    function endRound(){
      if(currentState.status === 'ended')return;
      setActionButtonsDisabled(true);
      gameStateRef.update({
        status: 'ended',
        endsAt: Date.now(),
        updatedAt: Date.now()
      });
    }

    function nextWord(){
      if(currentState.status !== 'playing' || getRemainingSeconds() <= 0){
        endRound();
        return;
      }
      gameStateRef.update(getNextWordState());
    }

    function applyResult(points){
      if(currentState.status !== 'playing' || getRemainingSeconds() <= 0){
        endRound();
        return;
      }
      const nextScore = (Number(currentState.score) || 0) + points;
      const updates = {
        score: nextScore,
        ...getNextWordState()
      };
      gameStateRef.update(updates);
      if(points){
        scoreEventsRef.push({
          playerId: currentState.currentPlayerId,
          playerUid: currentState.currentPlayerUid || null,
          playerName: currentState.currentPlayer || 'Giocatore',
          points,
          createdAt: Date.now()
        });
      }
    }

    function init(){
      btnStartRound.addEventListener('click', startRound);
      btnCorrect.addEventListener('click', () => applyResult(1));
      btnPass.addEventListener('click', nextWord);
      btnTaboo.addEventListener('click', () => applyResult(-1));
      timerInterval = setInterval(renderTimer, 300);
      gameStateRef.on('value', snap => {
        renderState(snap.val() || defaultState);
      });
      connectedRef.on('value', snap => {
        setConnection(Boolean(snap.val()));
      });
    }

    window.addEventListener('load', init);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('./service-worker.js').catch(function(error){
          console.warn('Service worker non registrato:', error);
        });
      });
    }
  </script>
</body>
</html>
